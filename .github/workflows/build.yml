name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Validate glTF writer (headless)
        run: |
          ./gradlew gltfSelfTest --no-daemon
          python3 validate_selftest.py build/selftest

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: recorte-jar
          path: build/libs/*.jar
          if-no-files-found: error
